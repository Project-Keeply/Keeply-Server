spring:
  application:
    name: keeply-server
  profiles:
    active: dev
server:
  forward-headers-strategy: framework

aws:
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: ${AWS_REGION}
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}

app:
  s3:
    access-url-prefix: ${APP_S3_ACCESS_URL_PREFIX}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

---

spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/keeply_dev?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
  logging:
    level:
      com.keeply: DEBUG
      org.hibernate.SQL: DEBUG

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 7200000
  refresh-token-expiration: 1209600000

kakao:
  client-id: ${KAKAO_CLIENT_ID}
  client-secret: ${KAKAO_CLIENT_SECRET}
  redirect-uri: ${KAKAO_REDIRECT_URI}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

---

spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  logging:
    level:
      com.keeply: INFO

server:
  forward-headers-strategy: framework

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 7200000
  refresh-token-expiration: 1209600000

kakao:
  client-id: ${KAKAO_CLIENT_ID}
  client-secret: ${KAKAO_CLIENT_SECRET}
  redirect-uri: ${KAKAO_REDIRECT_URI}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://keeply-work.vercel.app,https://keeply-client.vercel.app,http://localhost:5173}
